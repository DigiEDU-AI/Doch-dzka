<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dochádzkový systém</title>
  <style>
:root{
  --bg:#090909; --bg-panel:rgba(255,255,255,0.038); --bg-card:rgba(255,255,255,0.06);
  --bg-hover:rgba(255,255,255,0.09); --bg-input:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08); --border-s:rgba(255,255,255,0.15);
  --text:#e2e2e2; --text-m:#888; --text-d:#444;
  --blue:#3b82f6; --blue-g:rgba(59,130,246,0.18);
  --green:#10b981; --green-g:rgba(16,185,129,0.18);
  --red:#ef4444;   --red-g:rgba(239,68,68,0.18);
  --yellow:#f59e0b;
  --radius:12px; --radius-s:8px; --shadow:0 8px 32px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;animation:breathe 16s ease-in-out infinite;overflow-x:hidden}
@keyframes breathe{0%,100%{background-color:#090909}50%{background-color:#0b1320}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

/* ── SCREENS ───────────────────────────── */
.screen{display:none}
.screen.active{display:block}
#screen-login.active{display:flex}

/* ── LOGIN ─────────────────────────────── */
#screen-login{align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:radial-gradient(ellipse at 50% 40%,rgba(59,130,246,.07) 0%,transparent 70%)}
.login-box{
  width:100%;max-width:360px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius);
  padding:38px 30px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
}
.login-icon{text-align:center;font-size:48px;margin-bottom:12px;filter:drop-shadow(0 4px 16px rgba(59,130,246,.4))}
.login-h{text-align:center;font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.login-sub{text-align:center;color:var(--text-m);font-size:13px;margin-bottom:28px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-s);padding:11px 14px;color:var(--text);
  font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:14px;
}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.inp::placeholder{color:var(--text-d)}
.err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:8px;text-align:center}
.btn-login{
  width:100%;background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;border:none;border-radius:var(--radius-s);
  padding:12px;font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .1s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(59,130,246,.4);
  margin-bottom:16px;
}
.btn-login:hover{opacity:.9;box-shadow:0 6px 20px rgba(59,130,246,.5)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.45;cursor:not-allowed}
.admin-link{
  display:block;text-align:center;font-size:12px;color:var(--text-d);
  cursor:pointer;transition:color .15s;user-select:none;
}
.admin-link:hover{color:var(--text-m)}

/* ── HEADER ────────────────────────────── */
.app-hdr{
  display:flex;align-items:center;gap:14px;padding:10px 20px;
  background:rgba(9,9,9,.9);border-bottom:1px solid rgba(255,255,255,.07);
  position:sticky;top:0;z-index:200;backdrop-filter:blur(16px);
}
.hdr-logo{font-size:20px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;flex-shrink:0;letter-spacing:-.2px}
.hdr-nav{display:flex;align-items:center;gap:8px;margin:0 auto}
.wk-btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-s);color:var(--text);padding:5px 14px;
  font-size:18px;cursor:pointer;transition:all .15s;line-height:1;
}
.wk-btn:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.18)}
#week-lbl{font-size:14px;font-weight:600;min-width:180px;text-align:center;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.hdr-name{font-size:13px;font-weight:600}
.btn-hdr{
  background:none;border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-s);color:var(--text-m);
  padding:5px 12px;font-size:12px;cursor:pointer;transition:all .15s;
}
.btn-hdr:hover{border-color:var(--blue);color:var(--blue)}
.btn-hdr.danger:hover{border-color:var(--red);color:var(--red)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:all .3s}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s ease-in-out infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── WARN BANNER ───────────────────────── */
#low-warn{
  display:none;align-items:center;gap:10px;
  padding:9px 20px;font-size:13px;color:#fca5a5;
  background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.2);
  animation:fadeIn .25s ease;
}
#low-warn.show{display:flex}
.warn-days{font-weight:700;color:#f87171}

/* ── MAIN ──────────────────────────────── */
#app-main{padding:14px 18px;max-width:1440px;margin:0 auto}

/* ── CONTROLS ──────────────────────────── */
.ctrl-panel{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius);padding:11px 16px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.ctrl-lbl{font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.ctrl-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1}
.ctrl-sel{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-s);color:var(--text);padding:7px 10px;
  font-size:13px;outline:none;cursor:pointer;transition:border-color .15s;
}
.ctrl-sel:focus{border-color:var(--blue)}
.ctrl-sep{color:var(--text-m);font-size:15px;flex-shrink:0}
.btn-go{
  background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;
  border-radius:var(--radius-s);color:#fff;padding:7px 16px;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity .15s,box-shadow .2s;white-space:nowrap;
  box-shadow:0 2px 10px rgba(59,130,246,.35);
}
.btn-go:hover{opacity:.88;box-shadow:0 4px 14px rgba(59,130,246,.45)}
.btn-green-sm{
  background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);
  border-radius:var(--radius-s);color:var(--green);padding:7px 14px;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-green-sm:hover{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4)}
.btn-red-sm{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:var(--radius-s);color:var(--red);padding:7px 14px;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-red-sm:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}

/* ── CALENDAR TABLE ─────────────────────── */
.cal-wrap{
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius);margin-bottom:12px;
  overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4);
}
.cal-scroll{overflow-x:auto}
.cal-table{width:100%;border-collapse:collapse;min-width:680px}
.cal-table th,.cal-table td{border:1px solid rgba(255,255,255,.06)}

/* DAY HEADERS */
.cal-table thead th{
  background:rgba(255,255,255,.03);padding:12px 8px 10px;
  text-align:center;position:sticky;top:0;z-index:10;
  transition:all .25s;
}
.th-time{
  width:62px;min-width:62px;font-size:10px;color:var(--text-d);
  text-transform:uppercase;letter-spacing:.4px;
}
.th-day .day-name{font-size:13px;font-weight:700;margin-bottom:3px;letter-spacing:-.1px}
.th-day .day-date{font-size:11px;color:var(--text-m)}

/* TODAY */
.th-day.today-col{background:rgba(59,130,246,.08)}
.th-day.today-col .day-name{color:var(--blue)}
.th-day.today-col .day-date{color:var(--blue);font-weight:600}

/* GREEN GLOW DAY — dostatočné pokrytie */
.th-day.good-day{
  background:rgba(16,185,129,.07);
  box-shadow:inset 0 -3px 0 var(--green), 0 4px 16px rgba(16,185,129,.15);
}
.th-day.good-day .day-name{color:#6ee7b7}

/* RED GLOW DAY — nedostatočné pokrytie */
.th-day.low-day{
  background:rgba(239,68,68,.08);
  box-shadow:inset 0 -3px 0 var(--red), 0 4px 16px rgba(239,68,68,.2);
}
.th-day.low-day .day-name{color:#fca5a5}

/* TIME COLUMN */
.time-lbl{
  width:62px;padding:0 10px 0 8px;text-align:right;
  font-size:11px;color:var(--text-d);
  font-variant-numeric:tabular-nums;white-space:nowrap;
  vertical-align:middle;
  background:rgba(0,0,0,.2);user-select:none;
}

/* SLOT CELLS */
.slot-cell{
  padding:4px;vertical-align:top;height:44px;
  cursor:pointer;position:relative;
  transition:background .12s;
}
.slot-cell:hover{background:rgba(255,255,255,.045)}

/* Hover "+" / "−" hint */
.slot-cell::after{
  content:'';position:absolute;inset:0;
  pointer-events:none;opacity:0;transition:opacity .15s;
  border-radius:2px;
}
.slot-cell:hover::after{
  opacity:1;
  background:radial-gradient(circle at center,rgba(255,255,255,.06) 0%,transparent 70%);
}
.slot-cell .plus-hint{
  position:absolute;bottom:3px;right:6px;
  font-size:11px;color:rgba(255,255,255,.2);
  pointer-events:none;opacity:0;transition:opacity .15s;line-height:1;
  font-weight:600;
}
.slot-cell:hover .plus-hint{opacity:1}
.slot-cell.own-on .plus-hint{color:rgba(255,255,255,.35)}

/* Low/good column tint on cells */
.slot-cell.good-col{background:rgba(16,185,129,.03)}
.slot-cell.good-col:hover{background:rgba(16,185,129,.07)}
.slot-cell.low-col{background:rgba(239,68,68,.03)}
.slot-cell.low-col:hover{background:rgba(239,68,68,.07)}
.slot-cell.own-on{} /* base; bg set inline */

.slot-inner{display:flex;flex-wrap:wrap;gap:2px;min-height:34px;align-content:flex-start;padding:2px}

/* USER CHIPS */
.u-chip{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:50%;
  font-size:9px;font-weight:800;flex-shrink:0;
  border:2px solid transparent;
  transition:transform .15s,box-shadow .15s;
  cursor:default;letter-spacing:0;
}
.u-chip:hover{transform:scale(1.2);box-shadow:0 3px 12px rgba(0,0,0,.5);z-index:5;position:relative}
.u-chip.own-chip{border-color:rgba(255,255,255,.4)!important}

/* TFOOT */
.cal-table tfoot td{
  background:rgba(0,0,0,.25);
  padding:8px 6px;text-align:center;
  font-size:12px;vertical-align:top;
}
.tfoot-cell.good-col{background:rgba(16,185,129,.06);border-bottom:2px solid rgba(16,185,129,.3)!important}
.tfoot-cell.low-col{background:rgba(239,68,68,.06);border-bottom:2px solid rgba(239,68,68,.3)!important}
.stat-lbl{color:var(--text-d);font-size:12px;padding-top:6px;display:block}
.stat-cnt{font-weight:700;font-size:16px;display:block;margin-bottom:4px;line-height:1}
.stat-cnt.has{color:var(--green)}
.stat-cnt.low{color:var(--red)}
.stat-cnt.none{color:var(--text-d)}
.stat-names{display:flex;flex-direction:column;gap:2px}
.stat-name{
  font-size:10px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:120px;margin:0 auto;opacity:.85;
}

/* ── LEGEND ─────────────────────────────── */
.legend{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:var(--radius);padding:12px 18px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:10px;
}
.legend-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);flex-shrink:0}
.legend-items{display:flex;flex-wrap:wrap;gap:12px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:13px}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.leg-name.me{font-weight:700}

/* ── QUICK LINKS ─────────────────────────── */
.quick-links{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.quick-link-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:var(--radius-s);font-size:13px;font-weight:600;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  color:var(--text-m);cursor:pointer;text-decoration:none;transition:all .2s;
}
.quick-link-btn:hover{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3);color:var(--blue)}
.ql-icon{font-size:15px}

/* ── ADMIN ───────────────────────────────── */
#screen-admin.active{display:block}
.admin-wrap{max-width:1100px;margin:0 auto;padding:20px}
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);margin-bottom:18px;overflow:hidden}
.panel-hdr{background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);padding:13px 18px;display:flex;align-items:center;gap:10px}
.panel-icon{font-size:16px}
.panel-title{font-size:14px;font-weight:700}
.panel-count{margin-left:auto;font-size:12px;color:var(--text-m);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-s);padding:2px 10px}
.panel-body{padding:16px 18px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;align-items:end}
.form-group{display:flex;flex-direction:column;gap:5px}
.a-lbl{font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.4px}
.a-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-s);padding:9px 12px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
.a-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.a-inp::placeholder{color:var(--text-d)}
.inp-color{width:100%;height:38px;cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-s);background:rgba(255,255,255,.06);padding:3px 6px}
.btn{padding:9px 18px;border-radius:var(--radius-s);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;border:none;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 10px rgba(59,130,246,.3)}
.btn-g{background:rgba(16,185,129,.14);color:var(--green);border:1px solid rgba(16,185,129,.28)}
.btn-r{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.22)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-rnd{padding:7px 14px;border-radius:var(--radius-s);font-size:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text-m);cursor:pointer;transition:all .15s}
.btn-rnd:hover{border-color:var(--blue);color:var(--blue)}
.users-table{width:100%;border-collapse:collapse;font-size:13px}
.users-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid rgba(255,255,255,.07)}
.users-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
.users-table tr:last-child td{border-bottom:none}
.users-table tr:hover td{background:rgba(255,255,255,.02)}
.user-login{font-family:monospace;font-size:12px;color:var(--text-m)}
.user-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}
.edit-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-s);padding:6px 9px;color:var(--text);font-size:12px;outline:none;width:100%}
.edit-inp:focus{border-color:var(--blue)}
.edit-color-cell{width:38px;height:30px;cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-s);background:rgba(255,255,255,.06)}
.actions-cell{display:flex;gap:6px;align-items:center}
.empty-state{padding:28px;text-align:center;color:var(--text-d);font-size:13px}

/* ── WIDGETS ─────────────────────────────── */
#saving-bar{position:fixed;top:55px;right:18px;background:rgba(59,130,246,.14);border:1px solid rgba(59,130,246,.3);border-radius:var(--radius-s);padding:5px 14px;font-size:12px;color:var(--blue);z-index:300;display:none;align-items:center;gap:7px}
#saving-bar.show{display:flex}
.saving-spin{width:12px;height:12px;border:2px solid rgba(59,130,246,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
#toast-box{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:var(--radius-s);font-size:13px;font-weight:500;max-width:320px;background:rgba(15,15,15,.95);border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transform:translateX(16px);transition:all .22s;pointer-events:auto;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(0)}
.toast-success{border-color:rgba(16,185,129,.4)}
.toast-error{border-color:rgba(239,68,68,.4)}
.toast-info{border-color:rgba(59,130,246,.3)}
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(6px)}
#loading.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
.loading-txt{color:var(--text-m);font-size:14px}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="loading-txt" id="loading-txt">Načítavam...</div></div>
<div id="saving-bar"><div class="saving-spin"></div>Ukladám...</div>
<div id="toast-box"></div>

<!-- ══════════ LOGIN ══════════ -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="login-icon">📅</div>
    <div class="login-h">Dochádzkový systém</div>
    <div class="login-sub">Prihlás sa pre prístup k rozvrhu</div>
    <label class="lbl" for="u-username">Používateľské meno</label>
    <input class="inp" type="text" id="u-username" placeholder="meno.priezvisko" autocomplete="username">
    <label class="lbl" for="u-password">Heslo</label>
    <input class="inp" type="password" id="u-password" placeholder="••••••" autocomplete="current-password">
    <div class="err" id="login-err"></div>
    <button class="btn-login" id="btn-login">Prihlásiť sa</button>
    <span class="admin-link" id="admin-link">⚙️ Admin prístup</span>
  </div>
</div>

<!-- ══════════ KALENDÁR ══════════ -->
<div id="screen-app" class="screen">
  <div id="low-warn">
    <span>⚠️</span>
    <span>Nedostatočné pokrytie: <span class="warn-days" id="warn-days-list"></span></span>
  </div>

  <header class="app-hdr">
    <span class="hdr-logo">📅</span>
    <span class="hdr-title">Dochádzka</span>
    <div class="hdr-nav">

<script>
/* ═══════════════════════════════════════════════════════════════
   ██  KONFIGURÁCIA  — UPRAV TIETO HODNOTY
═══════════════════════════════════════════════════════════════ */
const GITHUB_REPO   = 'tvoje-meno/nazov-repo';    // ← zmeň
const GITHUB_TOKEN  = 'ghp_xxxxxxxxxxxxxxxxxxxx';  // ← zmeň
const GITHUB_BRANCH = 'main';

const ADMIN_USER = 'admin';
const ADMIN_PASS = 'PearlJam22';

/* Minimálny počet ľudí — pod tým sa zobrazí červené varovanie */
const MIN_STAFF = 2;

/* Tlačidlá pod legendou */
const QUICK_LINKS = [
  { icon: '📋', label: 'Plánovač zmien',  url: 'https://example.com' },
  { icon: '📊', label: 'Štatistiky',      url: 'https://example.com' },
  { icon: '💬', label: 'Firemný chat',    url: 'https://example.com' },
];

/* ═══════════════════════════════════════════════════════════════
   KONŠTANTY
═══════════════════════════════════════════════════════════════ */
const DATA_FILE  = 'data.json';
const COLORS     = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6'];
const DAY_NAMES  = ['Pondelok','Utorok','Streda','Štvrtok','Piatok'];
const WORK_START = 8 * 60;        // 08:00
const WORK_END   = 15 * 60 + 30;  // 15:30
const SLOT       = 30;
const SLOTS      = [];
for(let m = WORK_START; m < WORK_END; m += SLOT) SLOTS.push(m);

/* ═══════════════════════════════════════════════════════════════
   STAV
═══════════════════════════════════════════════════════════════ */
const CFG = { repo: GITHUB_REPO, token: GITHUB_TOKEN, branch: GITHUB_BRANCH };
let db        = { users: [], schedules: [] };
let dbSha     = null;
let me        = null;
let weekStart = null;
let saving    = false;
let pollTimer = null;

/* ═══════════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════════ */
const m2t = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const t2m = t => { const [h,mi]=t.split(':'); return +h*60 + +mi; };
const localDate = (d=new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmt = s => {
  const d=new Date(s+'T12:00:00');
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;
};
const initials = n => {
  const p=n.trim().split(/\s+/);
  return (p.length>=2 ? p[0][0]+p.at(-1)[0] : n.slice(0,2)).toUpperCase();
};
const hex2rgba = (h,a) => {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid = () => crypto.randomUUID();
function randomColor(id){ document.getElementById(id).value = COLORS[Math.floor(Math.random()*COLORS.length)]; }
function getMonday(d=new Date()){
  const c=new Date(d), day=c.getDay();
  c.setDate(c.getDate()-(day===0?6:day-1)); c.setHours(0,0,0,0); return c;
}
function weekDates(mon){
  return [0,1,2,3,4].map(i=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return localDate(d); });
}

/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
const showLoad = t => { document.getElementById('loading-txt').textContent=t||'Načítavam...'; document.getElementById('loading').classList.add('show'); };
const hideLoad = () => document.getElementById('loading').classList.remove('show');
const setSaving = v => { saving=v; document.getElementById('saving-bar').classList.toggle('show',v); };
function setSyncDot(state){
  const d=document.getElementById('sync-dot'); if(!d)return;
  d.className='sync-dot'+(state!=='ok'?' '+state:'');
}
function toast(msg,type='info',ms=3500){
  const c=document.getElementById('toast-box'), icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div'); el.className=`toast toast-${type}`;
  el.innerHTML=`<span>${icons[type]||'•'}</span><span>${esc(msg)}</span>`;
  c.appendChild(el); setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); },ms);
}

/* ═══════════════════════════════════════════════════════════════
   GITHUB API
═══════════════════════════════════════════════════════════════ */
function ghHeaders(){
  return { 'Authorization':`Bearer ${CFG.token}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' };
}

async function ghRead(){
  const r = await fetch(
    `https://api.github.com/repos/${CFG.repo}/contents/${DATA_FILE}?ref=${CFG.branch}&t=${Date.now()}`,
    { headers: ghHeaders() }
  );
  if(r.status === 404){ dbSha=null; db={users:[],schedules:[]}; return; }
  if(!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  const json = await r.json();
  dbSha = json.sha;
  const bytes = Uint8Array.from(atob(json.content.replace(/\n/g,'')), c=>c.charCodeAt(0));
  db = JSON.parse(new TextDecoder().decode(bytes));
  db.users     = db.users     || [];
  db.schedules = db.schedules || [];
}

async function ghWrite(message='Update'){
  const content_str = JSON.stringify(db, null, 2);
  const bytes = new TextEncoder().encode(content_str);
  let binary=''; bytes.forEach(b => binary += String.fromCharCode(b));
  const content = btoa(binary);
  const body = { message, content, branch: CFG.branch };
  if(dbSha) body.sha = dbSha;
  const r = await fetch(
    `https://api.github.com/repos/${CFG.repo}/contents/${DATA_FILE}`,
    { method:'PUT', headers:ghHeaders(), body:JSON.stringify(body) }
  );
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.message||r.statusText); }
  const res = await r.json();
  dbSha = res.content.sha;
}

async function ghSave(mutate, message='Update'){
  setSaving(true); setSyncDot('syncing');
  let attempts = 0;
  try{
    while(attempts < 3){
      try{
        if(attempts > 0) await ghRead();
        mutate(db);
        await ghWrite(message);
        setSyncDot('ok'); return;
      }catch(e){
        if((e.message.includes('409')||e.message.includes('conflict')) && attempts < 2){ attempts++; continue; }
        throw e;
      }
    }
  }catch(e){ setSyncDot('error'); throw e; }
  finally{ setSaving(false); }
}

function startPolling(){
  stopPolling();
  pollTimer = setInterval(async()=>{
    try{ await ghRead(); if(me) renderCalendar(); }
    catch(e){ setSyncDot('error'); }
  }, 30000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

/* ═══════════════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════════════ */
async function doLogin(){
  const username = document.getElementById('u-username').value.trim().toLowerCase();
  const password = document.getElementById('u-password').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('btn-login');
  if(!username||!password){ errEl.textContent='Vyplň meno aj heslo.'; return; }
  errEl.textContent=''; btn.disabled=true; btn.textContent='Prihlásenie…';

  try{
    // Admin bypass
    if(username === ADMIN_USER && password === ADMIN_PASS){
      btn.disabled=false; btn.textContent='Prihlásiť sa';
      await enterAdmin(); return;
    }

    // Normálny user — porovnanie priamo z JSON (plaintext password)
    const user = db.users.find(u => u.username === username && u.password === password);
    if(!user){ errEl.textContent='Nesprávne meno alebo heslo.'; return; }

    me = user;
    document.getElementById('hdr-dot').style.background = user.color;
    document.getElementById('hdr-name').textContent = user.display_name;
    weekStart = getMonday();
    renderCalendar(); renderLegend(); renderQuickLinks(); updateWeekLbl(); fillControls();
    setSyncDot('ok'); startPolling(); showScreen('app');
  }finally{ btn.disabled=false; btn.textContent='Prihlásiť sa'; }
}

function doLogout(){
  stopPolling(); me=null;
  document.getElementById('u-username').value='';
  document.getElementById('u-password').value='';
  document.getElementById('low-warn').classList.remove('show');
  showScreen('login');
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN
═══════════════════════════════════════════════════════════════ */
async function enterAdmin(){
  showLoad('Načítavam admin panel…');
  try{ renderAdminUsers(); randomColor('add-color'); showScreen('admin'); }
  finally{ hideLoad(); }
}
function adminLogout(){
  showScreen('login');
  document.getElementById('u-username').value='';
  document.getElementById('u-password').value='';
}

function renderAdminUsers(){
  const users = db.users;
  document.getElementById('user-count').textContent = users.length + ' používateľov';
  const tbody = document.getElementById('user-tbody');
  if(!users.length){
    tbody.innerHTML='<tr><td colspan="5" class="empty-state">Žiadni používatelia – pridaj prvého.</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u=>`
    <tr data-uid="${u.id}">
      <td><span class="user-dot" style="background:${u.color}"></span><span class="user-login">${esc(u.username)}</span></td>
      <td><input class="edit-inp edit-dn" value="${esc(u.display_name)}" style="min-width:140px"></td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <input type="color" class="edit-color-cell edit-color" value="${u.color}">
        <span class="user-dot edit-dot" style="background:${u.color}"></span>
      </div></td>
      <td><input class="edit-inp edit-pw" value="${esc(u.password||'')}" style="min-width:130px" placeholder="heslo"></td>
      <td><div class="actions-cell">
        <button class="btn btn-g btn-sm" onclick="saveUser('${u.id}')">💾 Uložiť</button>
        <button class="btn btn-r btn-sm" onclick="deleteUser('${u.id}','${esc(u.display_name)}')">🗑 Zmazať</button>
      </div></td>
    </tr>`).join('');
  tbody.querySelectorAll('.edit-color').forEach(inp=>{
    inp.addEventListener('input',()=>{ inp.closest('tr').querySelector('.edit-dot').style.background=inp.value; });
  });
}

async function addUser(){
  const username = document.getElementById('add-un').value.trim().toLowerCase();
  const dispName = document.getElementById('add-dn').value.trim();
  const color    = document.getElementById('add-color').value;
  const pw       = document.getElementById('add-pw').value.trim();
  if(!username){ toast('Zadaj prihlasovacie meno','error'); return; }
  if(!dispName){ toast('Zadaj zobrazované meno','error'); return; }
  if(!pw)      { toast('Zadaj heslo','error'); return; }
  if(db.users.some(u=>u.username===username)){ toast('"'+username+'" už existuje','error'); return; }

  showLoad('Vytváram používateľa…');
  try{
    const newUser = { id: uid(), username, display_name: dispName, color, password: pw };
    await ghSave(d=>{ d.users.push(newUser); }, 'Pridanie: '+username);
    toast(`${dispName} vytvorený!`, 'success');
    ['add-un','add-dn','add-pw'].forEach(id=>{ document.getElementById(id).value=''; });
    randomColor('add-color'); renderAdminUsers();
  }catch(e){ toast('Chyba: '+e.message,'error'); }
  finally{ hideLoad(); }
}

async function saveUser(userId){
  const row = document.querySelector(`tr[data-uid="${userId}"]`); if(!row)return;
  const dn  = row.querySelector('.edit-dn').value.trim();
  const col = row.querySelector('.edit-color').value;
  const pw  = row.querySelector('.edit-pw').value.trim();
  if(!dn){ toast('Meno nesmie byť prázdne','error'); return; }
  if(!pw){ toast('Heslo nesmie byť prázdne','error'); return; }
  showLoad('Ukladám…');
  try{
    await ghSave(d=>{
      const u = d.users.find(u=>u.id===userId); if(!u)return;
      u.display_name=dn; u.color=col; u.password=pw;
    }, 'Úprava používateľa');
    toast('Uložené','success',2000); renderAdminUsers();
  }catch(e){ toast('Chyba: '+e.message,'error'); }
  finally{ hideLoad(); }
}

async function deleteUser(userId,name){
  if(!confirm(`Naozaj vymazať "${name}"?\nVymaže sa aj celá jeho dochádzka!`))return;
  showLoad('Mažem…');
  try{
    await ghSave(d=>{
      d.users     = d.users.filter(u=>u.id!==userId);
      d.schedules = d.schedules.filter(s=>s.user_id!==userId);
    }, 'Zmazanie: '+name);
    toast(`${name} vymazaný`,'success'); renderAdminUsers();
  }catch(e){ toast('Chyba: '+e.message,'error'); }
  finally{ hideLoad(); }
}

/* ═══════════════════════════════════════════════════════════════
   SCHEDULE LOGIC
═══════════════════════════════════════════════════════════════ */
function getOccupied(userId,date){
  const set = new Set();
  db.schedules.filter(s=>s.user_id===userId&&s.date===date).forEach(s=>{
    const a=t2m(s.start_time), b=t2m(s.end_time);
    for(let m=a; m<b; m+=SLOT){ if(SLOTS.includes(m)) set.add(m); }
  });
  return set;
}
function toIntervals(set){
  if(!set.size) return [];
  const arr=[...set].sort((a,b)=>a-b); const res=[]; let s=arr[0],p=arr[0];
  for(let i=1;i<arr.length;i++){
    if(arr[i]===p+SLOT) p=arr[i];
    else{ res.push({s:m2t(s),e:m2t(p+SLOT)}); s=arr[i]; p=arr[i]; }
  }
  res.push({s:m2t(s),e:m2t(p+SLOT)}); return res;
}

async function saveDay(date, set){
  if(saving) return;
  try{
    const ivs = toIntervals(set);
    await ghSave(d=>{
      d.schedules = d.schedules.filter(s=>!(s.user_id===me.id&&s.date===date));
      ivs.forEach(iv=>d.schedules.push({id:uid(),user_id:me.id,date,start_time:iv.s,end_time:iv.e}));
    }, 'Dochádzka '+date);
    renderCalendar();
  }catch(e){ toast('Chyba ukladania: '+e.message,'error'); }
}

async function toggleSlot(date,slot){
  if(!me||saving) return;
  const set = getOccupied(me.id,date);
  if(set.has(slot)) set.delete(slot); else set.add(slot);
  await saveDay(date,set);
}

async function addInterval(){
  if(!me||saving) return;
  const date = document.getElementById('ctrl-day').value;
  const from = +document.getElementById('ctrl-from').value;
  const to   = +document.getElementById('ctrl-to').value;
  if(from>=to){ toast('"Od" musí byť pred "Do"','error'); return; }
  const set = getOccupied(me.id,date);
  for(let m=from; m<to; m+=SLOT) if(SLOTS.includes(m)) set.add(m);
  await saveDay(date,set); toast('Interval označený','success',2000);
}

async function markFull(){
  if(!me||saving) return;
  await saveDay(document.getElementById('ctrl-day').value, new Set(SLOTS));
  toast('Celý deň označený','success',2000);
}

async function clearDay(){
  if(!me||saving) return;
  const date = document.getElementById('ctrl-day').value;
  const i    = weekDates(weekStart).indexOf(date);
  if(!confirm(`Vymazať záznamy pre ${i>=0?DAY_NAMES[i]:date} ${fmt(date)}?`)) return;
  await saveDay(date, new Set()); toast('Záznamy vymazané','success',2000);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════════ */
function usersInSlot(date,slot){
  return db.users.filter(p=>
    db.schedules.some(s=>s.user_id===p.id&&s.date===date&&t2m(s.start_time)<=slot&&slot<t2m(s.end_time))
  );
}
function usersInDay(date){
  const ids = new Set(db.schedules.filter(s=>s.date===date).map(s=>s.user_id));
  return db.users.filter(u=>ids.has(u.id));
}

function renderCalendar(){
  if(!me) return;
  const table  = document.getElementById('cal-table');
  const dates  = weekDates(weekStart);
  const today  = localDate();
  const dayUsers = dates.map(d=>usersInDay(d));
  const lowDays  = dayUsers.map(u=>u.length < MIN_STAFF);
  const goodDays = dayUsers.map(u=>u.length >= MIN_STAFF && u.length > 0);

  // Warning banner
  const lowNames = dates.filter((_,i)=>lowDays[i]).map((d,_,__)=>{
    return DAY_NAMES[dates.indexOf(d)]+' '+fmt(d);
  });
  const warn = document.getElementById('low-warn');
  document.getElementById('warn-days-list').textContent = lowNames.join(' · ');
  warn.classList.toggle('show', lowNames.length > 0);

  // THEAD
  let h = '<thead><tr><th class="th-time">Čas</th>';
  dates.forEach((d,i)=>{
    const isT    = d===today;
    const isLow  = lowDays[i];
    const isGood = goodDays[i];
    let cls = 'th-day';
    if(isT)    cls += ' today-col';
    if(isGood) cls += ' good-day';
    if(isLow)  cls += ' low-day';
    h += `<th class="${cls}">
      <div class="day-name">${DAY_NAMES[i]}</div>
      <div class="day-date">${fmt(d)}</div>
    </th>`;
  });
  h += '</tr></thead><tbody>';

  // TBODY
  SLOTS.forEach(slot=>{
    h += `<tr><td class="time-lbl">${m2t(slot)}</td>`;
    dates.forEach((d,i)=>{
      const users  = usersInSlot(d,slot);
      const ownOn  = users.some(u=>u.id===me.id);
      const colCls = lowDays[i]?' low-col':goodDays[i]?' good-col':'';
      const bg     = ownOn ? `background:${hex2rgba(me.color,0.15)};` : '';
      h += `<td class="slot-cell${ownOn?' own-on':''}${colCls}" style="${bg}" data-date="${d}" data-slot="${slot}">
        <div class="slot-inner">`;
      users.forEach(u=>{
        const isMe = u.id===me.id;
        h += `<div class="u-chip${isMe?' own-chip':''}"
          style="background:${hex2rgba(u.color,0.3)};border-color:${hex2rgba(u.color,0.7)};color:${u.color};box-shadow:0 2px 8px ${hex2rgba(u.color,0.25)}"
          title="${esc(u.display_name)}">${initials(u.display_name)}</div>`;
      });
      h += `</div><span class="plus-hint">${ownOn?'−':'+'}</span></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody>';

  // TFOOT
  h += '<tfoot><tr><td><span class="stat-lbl">👥</span></td>';
  dates.forEach((d,i)=>{
    const users  = dayUsers[i];
    const cnt    = users.length;
    const isLow  = lowDays[i];
    const isGood = goodDays[i];
    const cntCls = cnt===0?'none':isLow?'low':'has';
    const colCls = isLow?' low-col':isGood?' good-col':'';
    h += `<td class="tfoot-cell${colCls}">
      <span class="stat-cnt ${cntCls}">${cnt>0?cnt:'–'}</span>
      <div class="stat-names">`;
    users.forEach(u=>{
      h += `<span class="stat-name" style="color:${u.color}" title="${esc(u.display_name)}">${esc(u.display_name)}</span>`;
    });
    h += `</div></td>`;
  });
  h += '</tr></tfoot>';

  table.innerHTML = h;
  table.querySelectorAll('.slot-cell').forEach(c=>{
    c.addEventListener('click',()=>toggleSlot(c.dataset.date,+c.dataset.slot));
  });
}

function renderLegend(){
  document.getElementById('legend-items').innerHTML = db.users.map(p=>{
    const isMe = p.id===me?.id;
    return `<div class="leg-item">
      <div class="leg-dot" style="background:${p.color};box-shadow:0 0 6px ${hex2rgba(p.color,.5)}"></div>
      <span class="leg-name${isMe?' me':''}">${esc(p.display_name)}${isMe?' (ja)':''}</span>
    </div>`;
  }).join('');
}

function renderQuickLinks(){
  document.getElementById('quick-links').innerHTML = QUICK_LINKS.map(l=>
    `<a class="quick-link-btn" href="${esc(l.url)}" target="_blank" rel="noopener">
      <span class="ql-icon">${l.icon}</span><span>${esc(l.label)}</span>
    </a>`
  ).join('');
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */
function updateWeekLbl(){
  const dates = weekDates(weekStart);
  const yr    = new Date(dates[0]+'T12:00:00').getFullYear();
  document.getElementById('week-lbl').textContent = `${fmt(dates[0])} – ${fmt(dates[4])} ${yr}`;
}

function fillControls(){
  const dates = weekDates(weekStart);
  const today = localDate();
  const dayEl = document.getElementById('ctrl-day');
  dayEl.innerHTML = dates.map((d,i)=>`<option value="${d}">${DAY_NAMES[i]} ${fmt(d)}</option>`).join('');
  if(dates.includes(today)) dayEl.value = today;
  document.getElementById('ctrl-from').innerHTML = SLOTS.map(m=>`<option value="${m}">${m2t(m)}</option>`).join('');
  const ends = [...SLOTS.slice(1), WORK_END];
  document.getElementById('ctrl-to').innerHTML = ends.map(m=>`<option value="${m}">${m2t(m)}</option>`).join('');
  document.getElementById('ctrl-from').value = WORK_START;
  document.getElementById('ctrl-to').value   = WORK_END;
}

async function gotoWeek(delta){
  weekStart.setDate(weekStart.getDate() + delta*7);
  updateWeekLbl(); fillControls();
  try{ await ghRead(); setSyncDot('ok'); }catch(e){ setSyncDot('error'); }
  renderCalendar();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
async function init(){
  // Event listeners
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('u-password').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('u-username').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('u-password').focus(); });
  document.getElementById('admin-link').addEventListener('click', ()=>{
    document.getElementById('u-username').value = ADMIN_USER;
    document.getElementById('u-password').value = '';
    document.getElementById('u-password').focus();
    document.getElementById('u-password').placeholder = 'Admin heslo…';
  });
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('btn-prev').addEventListener('click', ()=>gotoWeek(-1));
  document.getElementById('btn-next').addEventListener('click', ()=>gotoWeek(1));
  document.getElementById('btn-today').addEventListener('click', async()=>{
    weekStart=getMonday(); updateWeekLbl(); fillControls();
    try{ await ghRead(); setSyncDot('ok'); }catch(e){ setSyncDot('error'); }
    renderCalendar();
  });
  document.getElementById('btn-interval').addEventListener('click', addInterval);
  document.getElementById('btn-fullday').addEventListener('click', markFull);
  document.getElementById('btn-clearday').addEventListener('click', clearDay);

  // Načítaj dáta
  showLoad('Načítavam dáta…');
  try{
    await ghRead();
    hideLoad();
    showScreen('login');
  }catch(e){
    hideLoad();
    toast('⚠️ Chyba načítania. Skontroluj GITHUB_REPO a GITHUB_TOKEN v kóde.','error',10000);
    showScreen('login');
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
